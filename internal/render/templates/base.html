<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} - devops-eye</title>
<style>
body {
	font-family: monospace;
	font-size: 14px;
	margin: 0;
	padding: 20px;
	background: #f5f5f5;
	color: #333;
}
h1 {
	font-size: 20px;
	border-bottom: 2px solid #333;
	padding-bottom: 8px;
}
h2 {
	font-size: 16px;
	margin-top: 24px;
}
a {
	color: #0066cc;
}
table {
	border-collapse: collapse;
	margin: 10px 0;
}
th, td {
	text-align: left;
	padding: 4px 12px 4px 0;
	border-bottom: 1px solid #ddd;
}
th {
	font-weight: bold;
}
pre {
	background: #fff;
	border: 1px solid #ddd;
	padding: 10px;
	overflow-x: auto;
}
nav {
	margin-bottom: 16px;
}
nav a {
	margin-right: 12px;
}

<nav><a href="/">devops-eye</a></nav>
